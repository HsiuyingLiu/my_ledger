<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#EDE8E0">
<title>記帳本 2026</title>
<style>
  :root{
    /* Morandi 色系 tokens */
    --bg:#EDE8E0;
    --bg-soft:#E4DED3;
    --card:#F8F5EF;
    --card-alt:#FBF9F5;
    --ink:#242019;
    --ink-soft:#4A4338;
    --ink-faint:#6E6656;
    --line:#DCD3C4;
    --line-soft:#E8E1D3;
    --accent:#8C7862;
    --accent-dark:#6F5D4B;
    --accent-soft:#DCCFBC;
    --danger:#B06A5F;
    --danger-soft:#EBD9D4;
    --positive:#7D8F72;
    --white:#FFFFFF;

    /* 類別色 */
    --c-food:#C79A4E;
    --c-transport:#6F9C93;
    --c-home:#B48468;
    --c-medical:#8D7FA8;
    --c-personal:#BD8188;
    --c-utility:#7FA080;
    --c-fun:#CE9A5E;
    --c-learn:#6E86A3;
    --c-tax:#9C8F76;
    --c-finance:#93789A;
    --c-other:#9C9686;

    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:10px;
    --shadow-card: 0 2px 10px rgba(60,55,48,0.08);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
    font-size:18.5px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom: calc(72px + var(--safe-bottom));
    overflow-x:hidden;
  }

  h1,h2,h3{margin:0; font-weight:700; color:var(--ink);}

  /* Header */
  .app-header{
    position:sticky; top:0; z-index:20;
    background:var(--bg);
    padding:18px 20px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .app-header .brand{
    font-size:20px; font-weight:800; letter-spacing:0.5px; color:var(--ink);
    display:flex; align-items:center; gap:8px;
  }
  .app-header .brand .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--accent);
    display:inline-block;
  }
  .app-header .sub{font-size:14px; color:var(--ink-soft); font-weight:600;}

  main{padding: 4px 16px 24px;}

  .screen{display:none; animation:fadeIn .25s ease;}
  .screen.active{display:block;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .card{
    background:var(--card);
    border-radius:var(--radius-lg);
    padding:18px;
    box-shadow:var(--shadow-card);
    margin-bottom:16px;
    border:1px solid var(--line-soft);
  }

  /* Form elements */
  label.field-label{
    display:block; font-size:15px; font-weight:800; color:var(--ink-soft);
    margin:0 0 8px 2px; letter-spacing:0.3px;
  }
  .field{margin-bottom:20px; width:100%;}
  .field:last-child{margin-bottom:0;}

  input[type=date], input[type=text], input[type=number], textarea{
    display:block;
    width:100%;
    min-width:0;
    max-width:100%;
    -webkit-min-logical-width:0;
    background:var(--card-alt);
    border:1.5px solid var(--line);
    border-radius:var(--radius-md);
    padding:14px 14px;
    font-size:18px;
    color:var(--ink);
    font-family:inherit;
    outline:none;
    transition:border-color .15s;
    box-sizing:border-box;
  }
  input[type=date]{ min-height:52px; }
  input:focus, textarea:focus{border-color:var(--accent);}
  textarea{resize:none; min-height:52px;}

  .date-input-shell{
    position:relative;
    width:100%;
    min-height:52px;
    background:var(--card-alt);
    border:1.5px solid var(--line);
    border-radius:var(--radius-md);
    padding:14px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    box-sizing:border-box;
  }
  .date-input-shell #dateDisplayText{
    font-size:17px;
    font-weight:700;
    color:var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    letter-spacing:0.2px;
  }
  .date-input-shell .date-icon{
    width:19px; height:19px;
    stroke:var(--ink-soft);
    fill:none;
    stroke-width:1.8;
    flex-shrink:0;
  }
  input.date-native-overlay{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    border:0;
    opacity:0;
    cursor:pointer;
    -webkit-appearance:none;
    appearance:none;
  }

  .amount-input-wrap{position:relative;}
  .amount-input-wrap .cur{
    position:absolute; left:16px; top:50%; transform:translateY(-50%);
    color:var(--ink-soft); font-size:22px; font-weight:800;
  }
  .amount-input-wrap input{
    padding-left:38px; font-size:28px; font-weight:800; letter-spacing:0.5px;
    height:60px;
  }

  .chip-grid{display:flex; flex-wrap:wrap; gap:9px;}
  .chip{
    padding:11px 16px;
    border-radius:999px;
    background:var(--card-alt);
    border:1.5px solid var(--line);
    color:var(--ink-soft);
    font-size:16.5px; font-weight:700;
    cursor:pointer;
    display:flex; align-items:center; gap:7px;
    user-select:none;
    transition:all .12s;
  }
  .chip .swatch{width:9px;height:9px;border-radius:50%; flex-shrink:0;}
  .chip.selected{
    background:var(--ink); border-color:var(--ink); color:#fff;
  }
  .chip.selected .swatch{ box-shadow:0 0 0 2px rgba(255,255,255,0.6);}
  .chip:active{transform:scale(0.96);}

  .btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%;
    padding:17px;
    border-radius:var(--radius-md);
    border:none;
    font-size:18px; font-weight:800;
    cursor:pointer;
    font-family:inherit;
    letter-spacing:0.3px;
  }
  .btn-primary{ background:var(--accent); color:#fff; }
  .btn-primary:active{ background:var(--accent-dark); }
  .btn-secondary{ background:var(--card-alt); color:var(--ink); border:1.5px solid var(--line); }
  .btn-danger{ background:var(--danger-soft); color:var(--danger); }
  .btn-row{display:flex; gap:10px;}
  .btn-row .btn{flex:1;}
  .btn-sm{padding:10px 14px; font-size:14px; width:auto;}

  /* Bottom nav */
  .tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    background:var(--card);
    border-top:1px solid var(--line-soft);
    display:flex;
    padding-bottom: var(--safe-bottom);
    box-shadow:0 -2px 12px rgba(60,55,48,0.06);
  }
  .tab-btn{
    flex:1; background:none; border:none; padding:10px 4px 8px;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:var(--ink-soft); font-family:inherit; cursor:pointer;
  }
  .tab-btn svg{width:23px; height:23px; stroke:var(--ink-soft); fill:none; stroke-width:1.8;}
  .tab-btn span{font-size:12px; font-weight:800;}
  .tab-btn.active{color:var(--accent-dark);}
  .tab-btn.active svg{stroke:var(--accent-dark);}

  /* Month record list */
  .month-switcher{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .month-switcher .arrow-btn{
    width:40px; height:40px; border-radius:50%;
    background:var(--card); border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .month-switcher .arrow-btn svg{width:18px; height:18px; stroke:var(--ink); fill:none; stroke-width:2.2;}
  .month-switcher .title{font-size:20px; font-weight:800; text-align:center;}
  .month-switcher .title .yr{font-size:14px; color:var(--ink-soft); font-weight:700; display:block;}

  .total-banner{
    background:linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    border-radius:var(--radius-lg);
    padding:20px 22px;
    color:#fff;
    margin-bottom:16px;
    box-shadow:var(--shadow-card);
  }
  .total-banner .label{font-size:14px; opacity:0.92; font-weight:700; letter-spacing:0.5px;}
  .total-banner .amount{font-size:35px; font-weight:800; margin-top:4px; letter-spacing:0.3px;}
  .total-banner .meta{font-size:13.5px; opacity:0.9; margin-top:6px; font-weight:600;}

  .day-group{margin-bottom:6px;}
  .day-label{
    font-size:14px; font-weight:800; color:var(--ink-soft);
    margin:16px 2px 8px; display:flex; justify-content:space-between;
  }
  .tx-row{
    background:var(--card); border-radius:var(--radius-md);
    padding:14px 15px; margin-bottom:8px;
    display:flex; align-items:center; gap:12px;
    border:1px solid var(--line-soft);
    cursor:pointer;
  }
  .tx-row:active{background:var(--card-alt);}
  .tx-dot{width:11px; height:11px; border-radius:50%; flex-shrink:0;}
  .tx-mid{flex:1; min-width:0;}
  .tx-cat{font-size:16.5px; font-weight:800; color:var(--ink);}
  .tx-note{font-size:14.5px; color:var(--ink-soft); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tx-pay{
    font-size:12.5px; color:var(--ink-soft); background:var(--bg-soft);
    padding:3px 9px; border-radius:999px; display:inline-block; margin-top:4px; font-weight:700;
  }
  .tx-amt{font-size:18.5px; font-weight:800; color:var(--ink); white-space:nowrap;}
  .empty-state{
    text-align:center; padding:50px 20px; color:var(--ink-soft);
  }
  .empty-state svg{width:52px; height:52px; stroke:var(--ink-soft); fill:none; stroke-width:1.4; margin-bottom:10px;}
  .empty-state .t{font-size:16px; font-weight:700;}

  /* Bar chart */
  .bar-row{display:flex; align-items:center; gap:10px; margin-bottom:12px; cursor:pointer;}
  .bar-row .m-label{width:42px; font-size:15px; font-weight:800; color:var(--ink-soft); flex-shrink:0;}
  .bar-track{flex:1; background:var(--bg-soft); border-radius:8px; height:28px; position:relative; overflow:hidden;}
  .bar-fill{
    height:100%; border-radius:8px;
    background:var(--accent-soft);
    display:flex; align-items:center;
    transition:width .4s ease;
  }
  .bar-row.selected .bar-fill{background:var(--accent);}
  .bar-row.selected .m-label{color:var(--accent-dark);}
  .bar-val{font-size:13.5px; font-weight:800; color:var(--ink); width:72px; text-align:right; flex-shrink:0;}
  .bar-row.selected .bar-val{color:var(--accent-dark);}

  .year-select-wrap{display:flex; align-items:center; gap:10px; margin-bottom:16px;}
  select.year-select{
    background:var(--card); border:1.5px solid var(--line); border-radius:999px;
    padding:9px 16px; font-size:15px; font-weight:700; color:var(--ink);
    font-family:inherit;
  }

  .section-title{font-size:16px; font-weight:800; margin:22px 2px 12px;}

  /* Donut chart */
  .donut-wrap{display:flex; justify-content:center; margin:6px 0 18px;}
  .donut-center-label{font-size:12px; fill:var(--ink-faint); font-weight:700;}
  .donut-center-amount{font-size:20px; fill:var(--ink); font-weight:800;}

  .legend-row{
    display:flex; align-items:center; gap:10px;
    padding:11px 4px; border-bottom:1px solid var(--line-soft);
  }
  .legend-row:last-child{border-bottom:none;}
  .legend-dot{width:13px;height:13px;border-radius:50%; flex-shrink:0;}
  .legend-name{flex:1; font-size:16px; font-weight:800;}
  .legend-pct{font-size:14px; color:var(--ink-soft); width:48px; text-align:right; font-weight:600;}
  .legend-amt{font-size:16px; font-weight:800; width:84px; text-align:right;}

  /* Settings */
  .settings-item{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 2px; border-bottom:1px solid var(--line-soft);
  }
  .settings-item:last-child{border-bottom:none;}
  .settings-item .s-title{font-size:15.5px; font-weight:700;}
  .settings-item .s-desc{font-size:12.5px; color:var(--ink-faint); margin-top:2px;}
  .stat-grid{display:flex; gap:10px; margin-bottom:16px;}
  .stat-box{
    flex:1; background:var(--card); border-radius:var(--radius-md);
    padding:14px; text-align:center; border:1px solid var(--line-soft);
  }
  .stat-box .num{font-size:23px; font-weight:800; color:var(--accent-dark);}
  .stat-box .lbl{font-size:13px; color:var(--ink-soft); margin-top:2px; font-weight:700;}

  .toast{
    position:fixed; left:50%; bottom:calc(90px + var(--safe-bottom));
    transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff;
    padding:12px 22px; border-radius:999px;
    font-size:14.5px; font-weight:700;
    opacity:0; pointer-events:none;
    transition:all .25s ease;
    z-index:50;
    white-space:nowrap;
    box-shadow:0 4px 16px rgba(0,0,0,0.2);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .edit-banner{
    background:var(--accent-soft); color:var(--accent-dark);
    border-radius:var(--radius-md); padding:11px 14px;
    font-size:13.5px; font-weight:700; margin-bottom:16px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .edit-banner button{
    background:none; border:none; color:var(--accent-dark);
    font-weight:800; font-size:13px; cursor:pointer; text-decoration:underline;
  }

  .file-input-hidden{display:none;}

  ::selection{background:var(--accent-soft);}
</style>
</head>
<body>

<div class="app-header">
  <div class="brand"><span class="dot"></span>記帳本</div>
  <div class="sub" id="headerDate"></div>
</div>

<main>

  <!-- ============ 輸入畫面 ============ -->
  <section class="screen active" id="screen-input">
    <div class="card">
      <div id="editBanner" class="edit-banner" style="display:none;">
        <span>正在編輯這筆紀錄</span>
        <button id="cancelEditBtn">取消編輯</button>
      </div>

      <div class="field">
        <label class="field-label">日期</label>
        <div class="date-input-shell" id="dateShell">
          <span id="dateDisplayText">選擇日期</span>
          <svg class="date-icon" viewBox="0 0 24 24"><rect x="3.5" y="5.5" width="17" height="15" rx="2.5"/><path d="M8 3.5v4M16 3.5v4M3.5 10h17" stroke-linecap="round"/></svg>
          <input type="date" id="inpDate" class="date-native-overlay">
        </div>
      </div>

      <div class="field">
        <label class="field-label">消費金額</label>
        <div class="amount-input-wrap">
          <span class="cur">$</span>
          <input type="number" id="inpAmount" inputmode="decimal" placeholder="0" min="0">
        </div>
      </div>

      <div class="field">
        <label class="field-label">類別</label>
        <div class="chip-grid" id="categoryChips"></div>
      </div>

      <div class="field">
        <label class="field-label">付費方式</label>
        <div class="chip-grid" id="paymentChips"></div>
      </div>

      <div class="field">
        <label class="field-label">備註</label>
        <input type="text" id="inpNote" placeholder="例如：全聯購物">
      </div>

      <div class="btn-row" id="saveBtnRow">
        <button class="btn btn-primary" id="saveBtn">儲存</button>
      </div>
      <div class="btn-row" id="editExtraRow" style="display:none; margin-top:10px;">
        <button class="btn btn-danger" id="deleteBtn">刪除這筆</button>
      </div>
    </div>
  </section>

  <!-- ============ 本月紀錄畫面 ============ -->
  <section class="screen" id="screen-month">
    <div class="month-switcher">
      <div class="arrow-btn" id="prevMonthBtn"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="title"><span class="yr" id="monthYearLabel"></span><span id="monthLabel"></span></div>
      <div class="arrow-btn" id="nextMonthBtn"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>

    <div class="total-banner">
      <div class="label">本月消費總額</div>
      <div class="amount" id="monthTotalAmount">$0</div>
      <div class="meta" id="monthTotalMeta">共 0 筆紀錄</div>
    </div>

    <div id="monthList"></div>
  </section>

  <!-- ============ 統計畫面 ============ -->
  <section class="screen" id="screen-stats">
    <div class="year-select-wrap">
      <label class="field-label" style="margin:0;">年度：</label>
      <select class="year-select" id="yearSelect"></select>
    </div>

    <div class="card">
      <h3 style="margin-bottom:16px;">全年支出統計（月）</h3>
      <div id="yearBarChart"></div>
    </div>

    <div class="card" id="monthDonutCard">
      <div class="total-banner" style="margin-bottom:18px;">
        <div class="label" id="donutMonthLabel">—月消費總額</div>
        <div class="amount" id="donutTotalAmount">$0</div>
      </div>
      <div class="donut-wrap" id="donutChartWrap"></div>
      <div id="donutLegend"></div>
    </div>
  </section>

  <!-- ============ 設定 / 匯出匯入 ============ -->
  <section class="screen" id="screen-settings">
    <div class="stat-grid">
      <div class="stat-box"><div class="num" id="statCount">0</div><div class="lbl">總筆數</div></div>
      <div class="stat-box"><div class="num" id="statTotal">0</div><div class="lbl">總支出</div></div>
    </div>

    <div class="card">
      <div class="btn-row">
        <button class="btn btn-primary" id="exportXlsxBtn">匯出資料</button>
      </div>
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn btn-secondary" id="importBtn">匯入資料</button>
      </div>
      <input type="file" id="importFileInput" class="file-input-hidden" accept=".xlsx,.xls,.csv">
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn btn-danger" id="clearAllBtn">清除資料</button>
      </div>
    </div>
  </section>

</main>

<div class="tabbar">
  <button class="tab-btn active" data-tab="input">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
    <span>記一筆</span>
  </button>
  <button class="tab-btn" data-tab="month">
    <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 10h16M9 3v4M15 3v4" stroke-linecap="round"/></svg>
    <span>本月</span>
  </button>
  <button class="tab-btn" data-tab="stats">
    <svg viewBox="0 0 24 24"><path d="M5 19V10M12 19V5M19 19v-7" stroke-linecap="round"/></svg>
    <span>統計</span>
  </button>
  <button class="tab-btn" data-tab="settings">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13.5a7.6 7.6 0 000-3l1.8-1.4-2-3.4-2.1.6a7.7 7.7 0 00-2.6-1.5L14 2.5h-4l-.5 2.3a7.7 7.7 0 00-2.6 1.5l-2.1-.6-2 3.4L4.6 10.5a7.6 7.6 0 000 3L2.8 14.9l2 3.4 2.1-.6a7.7 7.7 0 002.6 1.5L10 21.5h4l.5-2.3a7.7 7.7 0 002.6-1.5l2.1.6 2-3.4z" stroke-linejoin="round"/></svg>
    <span>設定</span>
  </button>
</div>

<div class="toast" id="toast"></div>

  });
}

/* ========================= 儲存 / 讀取 ========================= */
function loadTransactions(){
  var raw = null;
  try{ raw = localStorage.getItem(STORAGE_KEY); }catch(e){}
  if(raw){
    try{
      var parsed = JSON.parse(raw);
      if(Array.isArray(parsed)) return parsed;
    }catch(e){}
  }
  // 第一次使用：匯入 Excel 原始資料
  var seeded = (window.SEED_DATA || []).map(function(r){
    return {
      id: uid(),
      date: r.date,
      amount: Number(r.amount)||0,
      category: r.category || "其他",
      note: r.note || "",
      payment: r.payment || ""
    };
  });
  saveTransactions(seeded);
  return seeded;
}
function saveTransactions(list){
  transactions = list;
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }catch(e){
    showToast("儲存失敗：裝置儲存空間可能已滿");
  }
}

/* ========================= Tab 切換 ========================= */
function switchTab(tab){
  document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
  document.getElementById("screen-"+tab).classList.add("active");
  document.querySelectorAll(".tab-btn").forEach(function(b){

/* ========================= 輸入畫面 ========================= */
function buildChips(containerId, items, getKey, getLabel, getColor, onSelect, selectedKeyGetter){
  var wrap = document.getElementById(containerId);
  wrap.innerHTML = "";
  items.forEach(function(item){
    var key = getKey(item);
    var chip = document.createElement("div");
    chip.className = "chip";
    chip.dataset.key = key;
    var colorHtml = getColor ? '<span class="swatch" style="background:'+getColor(item)+'"></span>' : "";
    chip.innerHTML = colorHtml + '<span>'+escapeHtml(getLabel(item))+'</span>';
    chip.addEventListener("click", function(){
      onSelect(key, chip, wrap);
    });
    wrap.appendChild(chip);
  });
}

function renderInputChips(){
  buildChips("categoryChips", CATEGORIES, function(c){return c.key;}, function(c){return c.key;}, function(c){return c.hex;},
    function(key, chip, wrap){
      selectedCategory = key;
      wrap.querySelectorAll(".chip").forEach(function(c){ c.classList.remove("selected"); });
      chip.classList.add("selected");
    });
  buildChips("paymentChips", PAYMENTS, function(p){return p;}, function(p){return p;}, null,
    function(key, chip, wrap){
      selectedPayment = (selectedPayment === key) ? null : key;
      wrap.querySelectorAll(".chip").forEach(function(c){ c.classList.remove("selected"); });
      if(selectedPayment) chip.classList.add("selected");
    });
}

function resetInputForm(keepDate){
  var dateVal = keepDate ? document.getElementById("inpDate").value : todayStr();
  setInputDate(dateVal);
  document.getElementById("inpAmount").value = "";
  document.getElementById("inpNote").value = "";
  selectedCategory = null;
  selectedPayment = null;
  document.querySelectorAll("#categoryChips .chip").forEach(function(c){ c.classList.remove("selected"); });
  document.querySelectorAll("#paymentChips .chip").forEach(function(c){ c.classList.remove("selected"); });
  editingId = null;
  document.getElementById("editBanner").style.display = "none";
  document.getElementById("editExtraRow").style.display = "none";
  document.getElementById("saveBtn").textContent = "儲存";
}

function loadRecordIntoForm(tx){
  editingId = tx.id;
  setInputDate(tx.date);
  document.getElementById("inpAmount").value = tx.amount || "";
  document.getElementById("inpNote").value = tx.note || "";
  selectedCategory = tx.category || null;
  selectedPayment = tx.payment || null;
  document.querySelectorAll("#categoryChips .chip").forEach(function(c){
    c.classList.toggle("selected", c.dataset.key === selectedCategory);
  });
  document.querySelectorAll("#paymentChips .chip").forEach(function(c){
    c.classList.toggle("selected", c.dataset.key === selectedPayment);
  });
  document.getElementById("editBanner").style.display = "flex";
  document.getElementById("editExtraRow").style.display = "flex";
  document.getElementById("saveBtn").textContent = "更新這筆紀錄";
  switchTab("input");
}

function handleSave(){
  var date = document.getElementById("inpDate").value;
  var amount = parseFloat(document.getElementById("inpAmount").value);
  var note = document.getElementById("inpNote").value.trim();

  if(!date){ showToast("請選擇日期"); return; }
  if(isNaN(amount) || amount < 0){ showToast("請輸入正確的消費金額"); return; }
  if(!selectedCategory){ showToast("請選擇類別"); return; }

  if(editingId){
    var idx = transactions.findIndex(function(t){ return t.id === editingId; });
    if(idx >= 0){
      transactions[idx] = {
        id: editingId, date: date, amount: amount,
        category: selectedCategory, note: note, payment: selectedPayment || ""
      };
      saveTransactions(transactions.slice());
      showToast("已更新這筆紀錄");
    }
  } else {
    var tx = {
      id: uid(), date: date, amount: amount,
      category: selectedCategory, note: note, payment: selectedPayment || ""
    };
    transactions.push(tx);
    saveTransactions(transactions.slice());
    showToast("已儲存");
  }

  var savedDate = date;
  resetInputForm(true);
  currentMonthKey = savedDate.slice(0,7);
  switchTab("month");
}

function handleDelete(){
  if(!editingId) return;
  if(!confirm("確定要刪除這筆紀錄嗎？")) return;
  transactions = transactions.filter(function(t){ return t.id !== editingId; });
  saveTransactions(transactions.slice());
  showToast("已刪除");
  resetInputForm(false);
  switchTab("month");
}

/* ========================= 本月紀錄畫面 ========================= */
function shiftMonth(delta){
  var parts = currentMonthKey.split("-").map(Number);
  var y = parts[0], m = parts[1];
  m += delta;
  if(m < 1){ m = 12; y -= 1; }
  if(m > 12){ m = 1; y += 1; }
  currentMonthKey = fmtMonthKey(y,m);
  renderMonthScreen();
}

function renderMonthScreen(){
  var parts = currentMonthKey.split("-").map(Number);
  var y = parts[0], m = parts[1];
  document.getElementById("monthYearLabel").textContent = y + " 年";
  document.getElementById("monthLabel").textContent = MONTH_NAMES[m-1];

  var monthTx = transactions.filter(function(t){ return t.date && t.date.slice(0,7) === currentMonthKey; });
  monthTx.sort(function(a,b){ return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });

  var total = monthTx.reduce(function(s,t){ return s + (Number(t.amount)||0); }, 0);
  document.getElementById("monthTotalAmount").textContent = money(total);
  document.getElementById("monthTotalMeta").textContent = "共 " + monthTx.length + " 筆紀錄";

  var listEl = document.getElementById("monthList");
  listEl.innerHTML = "";

  if(monthTx.length === 0){
    listEl.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 10h16" stroke-linecap="round"/></svg><div class="t">這個月還沒有紀錄</div></div>';
    return;
  }

  var groups = {};
  var order = [];
  monthTx.forEach(function(t){
    if(!groups[t.date]){ groups[t.date] = []; order.push(t.date); }
    groups[t.date].push(t);
  });

  order.forEach(function(dateKey){
    var d = new Date(dateKey + "T00:00:00");
    var wd = ["日","一","二","三","四","五","六"][d.getDay()];
    var dayNum = Number(dateKey.slice(8,10));
    var dayTotal = groups[dateKey].reduce(function(s,t){ return s+(Number(t.amount)||0); }, 0);

    var dayLabel = document.createElement("div");
    dayLabel.className = "day-label";
    dayLabel.innerHTML = '<span>' + dayNum + ' 日 週' + wd + '</span><span>' + money(dayTotal) + '</span>';
    listEl.appendChild(dayLabel);

    groups[dateKey].forEach(function(t){
      var row = document.createElement("div");
      row.className = "tx-row";
      row.innerHTML =
        '<div class="tx-dot" style="background:'+catColorHex(t.category)+'"></div>' +
        '<div class="tx-mid">' +
          '<div class="tx-cat">' + escapeHtml(t.category || "其他") + '</div>' +
          (t.note ? '<div class="tx-note">'+escapeHtml(t.note)+'</div>' : '') +
          (t.payment ? '<div class="tx-pay">'+escapeHtml(t.payment)+'</div>' : '') +
        '</div>' +
        '<div class="tx-amt">' + money(t.amount) + '</div>';
      row.addEventListener("click", function(){ loadRecordIntoForm(t); });
      listEl.appendChild(row);
    });
  });
}

/* ========================= 統計畫面 ========================= */
function getAvailableYears(){
  var years = {};
  years[today.getFullYear()] = true;
  transactions.forEach(function(t){
    if(t.date) years[Number(t.date.slice(0,4))] = true;
  });
  return Object.keys(years).map(Number).sort(function(a,b){return b-a;});
}

function renderStatsScreen(){
  var yearSelect = document.getElementById("yearSelect");
  var years = getAvailableYears();
  yearSelect.innerHTML = years.map(function(y){
    return '<option value="'+y+'"'+(y===statsYear?' selected':'')+'>'+y+' 年</option>';
  }).join("");

  renderYearBarChart();
  renderMonthDonut();
}

function renderYearBarChart(){
  var wrap = document.getElementById("yearBarChart");
  wrap.innerHTML = "";

  var monthTotals = new Array(12).fill(0);
  transactions.forEach(function(t){
    if(!t.date) return;
    var y = Number(t.date.slice(0,4));
    var m = Number(t.date.slice(5,7));
    if(y === statsYear) monthTotals[m-1] += (Number(t.amount)||0);
  });

  var maxVal = Math.max.apply(null, monthTotals.concat([1]));

  monthTotals.forEach(function(val, idx){
    var m = idx+1;
    var row = document.createElement("div");
    row.className = "bar-row" + (m===statsMonth ? " selected" : "");
    var widthPct = Math.max(2, Math.round((val/maxVal)*100));
    row.innerHTML =
      '<div class="m-label">' + m + '月</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:'+widthPct+'%"></div></div>' +
      '<div class="bar-val">' + (val>0 ? money(val) : "$0") + '</div>';
    row.addEventListener("click", function(){
      statsMonth = m;
      document.querySelectorAll(".bar-row").forEach(function(r){ r.classList.remove("selected"); });
      row.classList.add("selected");
      renderMonthDonut();
      document.getElementById("monthDonutCard").scrollIntoView({behavior:"smooth", block:"start"});
    });
    wrap.appendChild(row);
  });
}

function renderMonthDonut(){
  var monthKey = fmtMonthKey(statsYear, statsMonth);
  var monthTx = transactions.filter(function(t){ return t.date && t.date.slice(0,7) === monthKey; });

  var sums = {};
  var total = 0;
  monthTx.forEach(function(t){
    var cat = t.category || "其他";
    sums[cat] = (sums[cat]||0) + (Number(t.amount)||0);
    total += (Number(t.amount)||0);
  });

  document.getElementById("donutMonthLabel").textContent = statsYear + " 年 " + MONTH_NAMES[statsMonth-1] + " 消費總額";
  document.getElementById("donutTotalAmount").textContent = money(total);

  var entries = Object.keys(sums).map(function(k){ return {cat:k, amt:sums[k]}; })
    .filter(function(e){ return e.amt > 0; })
    .sort(function(a,b){ return b.amt - a.amt; });

  var donutWrap = document.getElementById("donutChartWrap");
  var legendWrap = document.getElementById("donutLegend");

  if(entries.length === 0 || total <= 0){
    donutWrap.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg><div class="t">這個月還沒有支出資料</div></div>';
    legendWrap.innerHTML = "";
    return;
  }

  donutWrap.innerHTML = buildDonutSvg(entries, total);

  legendWrap.innerHTML = entries.map(function(e){
    var pct = ((e.amt/total)*100).toFixed(1);
    return '<div class="legend-row">' +
      '<div class="legend-dot" style="background:'+catColorHex(e.cat)+'"></div>' +
      '<div class="legend-name">'+escapeHtml(e.cat)+'</div>' +
      '<div class="legend-pct">'+pct+'%</div>' +
      '<div class="legend-amt">'+money(e.amt)+'</div>' +
    '</div>';
  }).join("");
}

function buildDonutSvg(entries, total){
  var size = 220;
  var cx = size/2, cy = size/2;
  var r = 78;
  var strokeW = 30;
  var circumference = 2 * Math.PI * r;

  var offsetAcc = 0;
  var segs = entries.map(function(e){
    var frac = e.amt/total;
    var len = frac * circumference;
    var seg = '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+catColorHex(e.cat)+'" ' +
      'stroke-width="'+strokeW+'" stroke-dasharray="'+len+' '+(circumference-len)+'" ' +
      'stroke-dashoffset="'+(-offsetAcc)+'" stroke-linecap="butt"></circle>';
    offsetAcc += len;
    return seg;
  }).join("");

  var svg = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">' +
    '<g transform="rotate(-90 '+cx+' '+cy+')">' + segs + '</g>' +
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+(r-strokeW/2-2)+'" fill="var(--card)"></circle>' +
    '<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" class="donut-center-label">類別分佈</text>' +
    '<text x="'+cx+'" y="'+(cy+20)+'" text-anchor="middle" class="donut-center-amount">'+entries.length+' 類</text>' +
    '</svg>';
  return svg;
}

/* ---- 匯出 CSV ---- */
function exportCsv(){
  var rows = [["日期","消費金額","類別","備註","付費方式"]];
  transactions.slice().sort(function(a,b){ return a.date < b.date ? -1 : 1; }).forEach(function(t){
    rows.push([t.date, t.amount, t.category, t.note, t.payment]);
  });
  var csv = rows.map(function(r){
    return r.map(function(cell){
      var s = (cell===null||cell===undefined) ? "" : String(cell);
      if(/[",\n]/.test(s)) s = '"' + s.replace(/"/g,'""') + '"';
      return s;
    }).join(",");
  }).join("\n");
  var blob = new Blob(["\uFEFF" + csv], {type:"text/csv;charset=utf-8;"});
  downloadBlob(blob, "記帳" + today.getFullYear() + "_" + Date.now() + ".csv");
  showToast("CSV 已匯出");
}

/* ---- 匯出 Excel (.xlsx)，格式比照原始檔案結構 ---- */
function exportXlsx(){
  if(typeof XLSX === "undefined"){ showToast("匯出功能載入中，請稍後再試"); return; }

  var years = getAvailableYears();
  var wb = XLSX.utils.book_new();

  years.forEach(function(y){
    var yearTx = transactions.filter(function(t){ return t.date && Number(t.date.slice(0,4)) === y; });
    if(yearTx.length === 0) return;

    // 年度統計 - 支出統計
    var statHeader = ["類別"].concat(MONTH_NAMES, ["合計"]);
    var catOrder = CATEGORIES.map(function(c){return c.key;});
    var statRows = [statHeader];
    var monthColTotals = new Array(12).fill(0);
    catOrder.forEach(function(cat){
      var rowVals = [cat];
      var rowTotal = 0;
      for(var m=1;m<=12;m++){
        var mk = fmtMonthKey(y,m);
        var sum = yearTx.filter(function(t){ return t.date.slice(0,7)===mk && (t.category||"其他")===cat; })
                         .reduce(function(s,t){ return s+(Number(t.amount)||0); },0);
        rowVals.push(sum);
        rowTotal += sum;
        monthColTotals[m-1] += sum;
      }
      rowVals.push(rowTotal);
      if(rowTotal > 0 || yearTx.some(function(t){return (t.category||"其他")===cat;})) statRows.push(rowVals);
    });
    var grandTotalRow = ["支出總計"].concat(monthColTotals, [monthColTotals.reduce(function(a,b){return a+b;},0)]);
    statRows.push(grandTotalRow);
    var statSheet = XLSX.utils.aoa_to_sheet(statRows);
    XLSX.utils.book_append_sheet(wb, statSheet, (y+" 年度統計").slice(0,31));

    // 每月支出明細
    for(var m=1;m<=12;m++){
      var mk = fmtMonthKey(y,m);
      var monthRows = yearTx.filter(function(t){ return t.date.slice(0,7)===mk; })
                             .sort(function(a,b){ return a.date<b.date?-1:1; });
      if(monthRows.length === 0) continue;
      var aoa = [["日期","消費金額","類別","備註","付費方式"]];
      monthRows.forEach(function(t){
        aoa.push([t.date, t.amount, t.category, t.note, t.payment]);
      });
      var sheet = XLSX.utils.aoa_to_sheet(aoa);
      XLSX.utils.book_append_sheet(wb, sheet, (MONTH_NAMES[m-1]+" 支出").slice(0,31));
    }
  });

  // 全部資料（單一總表，方便快速瀏覽）
  var allAoa = [["日期","消費金額","類別","備註","付費方式"]];
  transactions.slice().sort(function(a,b){ return a.date<b.date?-1:1; }).forEach(function(t){
    allAoa.push([t.date, t.amount, t.category, t.note, t.payment]);
  });
  var allSheet = XLSX.utils.aoa_to_sheet(allAoa);
  XLSX.utils.book_append_sheet(wb, allSheet, "全部資料");

  var fname = "記帳" + today.getFullYear() + "_" + Date.now() + ".xlsx";
  XLSX.writeFile(wb, fname);
  showToast("Excel 已匯出");
}

function downloadBlob(blob, filename){
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

/* ---- 匯入 ---- */
function handleImportFile(file){
  var name = file.name.toLowerCase();
  if(name.endsWith(".csv")){
    var reader = new FileReader();
    reader.onload = function(e){
      try{
        var text = e.target.result.replace(/^\uFEFF/, "");
        var lines = text.split(/\r?\n/).filter(function(l){ return l.trim().length>0; });
        var startIdx = 0;
        if(lines[0] && lines[0].indexOf("日期")>=0) startIdx = 1;
        var added = 0;
        for(var i=startIdx;i<lines.length;i++){
          var cells = parseCsvLine(lines[i]);
          var rec = rowToRecord(cells);
          if(rec){ transactions.push(rec); added++; }
        }
        saveTransactions(transactions.slice());
        showToast("已匯入 " + added + " 筆資料");
        renderSettingsScreen();
      }catch(err){
        showToast("匯入失敗，請確認檔案格式");
      }
    };
    reader.readAsText(file, "UTF-8");
  } else {
    var reader2 = new FileReader();
    reader2.onload = function(e){
      try{
        var data = new Uint8Array(e.target.result);
        var wb = XLSX.read(data, {type:"array", cellDates:true});
        var added = 0;
        wb.SheetNames.forEach(function(sn){
          var sheet = wb.Sheets[sn];
          var rows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:true});
          var headerIdx = -1;
          for(var i=0;i<rows.length;i++){
            if(rows[i] && rows[i][0] === "日期"){ headerIdx = i; break; }
          }
          if(headerIdx === -1) return;
          for(var j=headerIdx+1;j<rows.length;j++){
            var row = rows[j];
            if(!row || row.every(function(v){return v===undefined||v==="";})) continue;
            var rec = rowToRecord(row);
            if(rec){ transactions.push(rec); added++; }
          }
        });
        saveTransactions(transactions.slice());
        showToast("已匯入 " + added + " 筆資料");
        renderSettingsScreen();
      }catch(err){
        showToast("匯入失敗，請確認檔案格式");
      }
    };
    reader2.readAsArrayBuffer(file);
  }
}

function parseCsvLine(line){
  var result = []; var cur = ""; var inQuotes = false;
  for(var i=0;i<line.length;i++){
    var ch = line[i];
    if(inQuotes){
      if(ch === '"'){
        if(line[i+1] === '"'){ cur += '"'; i++; } else { inQuotes = false; }
      } else cur += ch;
    } else {
      if(ch === '"') inQuotes = true;
      else if(ch === ','){ result.push(cur); cur = ""; }
      else cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function rowToRecord(cells){
  if(!cells || cells.length < 2) return null;
  var rawDate = cells[0];
  var dateStr = "";
  if(rawDate instanceof Date){
    dateStr = rawDate.getFullYear() + "-" + pad2(rawDate.getMonth()+1) + "-" + pad2(rawDate.getDate());
  } else if(typeof rawDate === "string"){
    var m = rawDate.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
    if(m) dateStr = m[1] + "-" + pad2(Number(m[2])) + "-" + pad2(Number(m[3]));
  }
  if(!dateStr) return null;
  var amount = parseFloat(cells[1]);
  if(isNaN(amount)) amount = 0;
  var category = (cells[2]||"").toString().trim() || "其他";
  var note = (cells[3]||"").toString().trim();
  var payment = (cells[4]||"").toString().trim();
  return {id:uid(), date:dateStr, amount:amount, category:category, note:note, payment:payment};
}

/* ========================= 事件綁定 ========================= */
function initEvents(){
  document.querySelectorAll(".tab-btn").forEach(function(btn){
    btn.addEventListener("click", function(){ switchTab(btn.dataset.tab); });
  });

  document.getElementById("saveBtn").addEventListener("click", handleSave);
  document.getElementById("deleteBtn").addEventListener("click", handleDelete);
  document.getElementById("cancelEditBtn").addEventListener("click", function(){
    resetInputForm(false);
  });

  document.getElementById("inpDate").addEventListener("change", function(){
    document.getElementById("dateDisplayText").textContent = formatDateDisplay(this.value);
  });

  document.getElementById("prevMonthBtn").addEventListener("click", function(){ shiftMonth(-1); });
  document.getElementById("nextMonthBtn").addEventListener("click", function(){ shiftMonth(1); });

  document.getElementById("yearSelect").addEventListener("change", function(){
    statsYear = Number(this.value);
    renderYearBarChart();
    renderMonthDonut();
  });

  document.getElementById("exportXlsxBtn").addEventListener("click", exportXlsx);

  document.getElementById("importBtn").addEventListener("click", function(){
    document.getElementById("importFileInput").click();
  });
  document.getElementById("importFileInput").addEventListener("change", function(e){
    var file = e.target.files[0];
    if(file) handleImportFile(file);
    e.target.value = "";
  });

  document.getElementById("clearAllBtn").addEventListener("click", function(){
    if(confirm("確定要清除所有記帳資料嗎？建議先匯出備份。")){
      if(confirm("再次確認：這個動作無法復原，真的要刪除全部資料嗎？")){
        saveTransactions([]);
        showToast("已清除所有資料");
        renderSettingsScreen();
        renderMonthScreen();
      }
    }
  });
}

/* ========================= 啟動 ========================= */
function init(){
  var hd = document.getElementById("headerDate");
  var wd = ["日","一","二","三","四","五","六"][today.getDay()];
  hd.textContent = (today.getMonth()+1) + "月" + today.getDate() + "日 週" + wd;

  document.getElementById("inpDate").value = todayStr();
  document.getElementById("dateDisplayText").textContent = formatDateDisplay(todayStr());

  transactions = loadTransactions();
  renderInputChips();
  initEvents();
  switchTab("input");
}

document.addEventListener("DOMContentLoaded", init);
})();

</script>
</body>
</html>
